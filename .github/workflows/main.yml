name: Test
on: [push]

permissions: read-all

jobs:
  trunk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
      - uses: pre-commit-ci/lite-action@v1.0.2
        if: always()

  test-gcc:
    needs: pre-commit
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc]
        gcc_version: [13, 14]
        bazel_config: [asan, cpp23, opt]
        # Using `include` does not make the options show up in the generated config names...
        exclude:
          - bazel_config: asan
            gcc_version: 13
          - bazel_config: cpp23
            gcc_version: 13

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: false
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      gcc_version: ${{ matrix.gcc_version }}
      bazel_config: ${{ matrix.bazel_config }}

  test-bcr:
    needs: [pre-commit, test-gcc]
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26]
        compiler: [gcc, native, clang]
        gcc_version: [13]
        llvm_version: [20.1.8]
        bazel_config: [opt]
        # Bazel-version compatibility rungs, crossed with the os/compiler combos
        # below. 7.2.1 is the earliest 7.x that works: MODULE.bazel uses
        # `include()` (added in 7.2.0, so 7.1.x fails with "name 'include' is not
        # defined") and the dep `depend_on_what_you_use@0.16.0` declares
        # `bazel_compatibility: [>=7.2.1]` (so 7.2.0 is rejected too). Plus the
        # latest 8.x (8.7.0), the latest 9.0.x (9.0.2), and the checked-in
        # default 9.1.1.
        bazel_version: [7.2.1, 8.7.0, 9.0.2, 9.1.1]
        exclude:
          - os: ubuntu-latest
            compiler: native
          - os: macos-26
            compiler: gcc

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: false
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      gcc_version: ${{ matrix.gcc_version }}
      llvm_version: ${{ matrix.llvm_version }}
      bazel_config: ${{ matrix.bazel_config }}
      bazel_version: ${{ matrix.bazel_version }}

  test-clang:
    needs: [pre-commit, test-gcc, test-bcr]
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26]
        compiler: [clang]
        # Hermetic toolchains_llvm clang (independent of the runner's Apple clang).
        # Ladder: working default (20), macOS native match (21 = Apple clang 21), newest (22).
        # NOTE: 21.1.8 / 22.1.7 do NOT build mbo yet -- clang 21 tightened constexpr
        # and breaks struct_names_clang.h field-name reflection. This job is
        # continue-on-error, so they run as non-blocking tracking rungs (opt only)
        # until that port lands; then promote the default pin to 21.x.
        # TODO(llvm-23): add 23.x here once released and listed in toolchains_llvm.
        llvm_version: [20.1.8] # TODO:, 21.1.8, 22.1.7]
        bazel_config: [asan, cpp23, fastbuild, opt]
        exclude:
          # macOS runs the opt config only.
          - os: macos-26
            bazel_config: asan
          - os: macos-26
            bazel_config: cpp23
          - os: macos-26
            bazel_config: fastbuild
          # 20.1.8 is the working default -> full config coverage. 21.1.8 / 22.1.7
          # are known-failing tracking rungs -> opt only (don't burn CI on configs
          # that can't compile yet).
          #- llvm_version: 21.1.8
          #  bazel_config: asan
          #- llvm_version: 21.1.8
          #  bazel_config: cpp23
          #- llvm_version: 21.1.8
          #  bazel_config: fastbuild
          #- llvm_version: 22.1.7
          #  bazel_config: asan
          #- llvm_version: 22.1.7
          #  bazel_config: cpp23
          #- llvm_version: 22.1.7
          #  bazel_config: fastbuild

    uses: ./.github/workflows/test.yml
    with:
      continue-on-error: true
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      llvm_version: ${{ matrix.llvm_version }}
      bazel_config: ${{ matrix.bazel_config }}

  # Single aggregating gate for branch protection. It depends on every job that
  # must pass, so "done" is the only status check that needs to be marked
  # "required" on the main branch -- adding or renaming a job above no longer
  # means editing branch protection, only this job's `needs` list. When any
  # dependency fails or is cancelled, this job fails and names the offending
  # jobs in its log and in the run summary.
  done:
    needs: [trunk, pre-commit, test-gcc, test-clang, test-bcr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure every job is wired into this gate
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          # Parse the workflow with a real YAML reader (yq) and fail if any
          # declared job (other than this gate) is absent from `needs` above, so
          # a newly added job cannot silently escape the required gate.
          declared="$(yq '.jobs | keys | .[]' .github/workflows/main.yml |
            grep -vx done | sort)"
          wired="$(jq -r 'keys[]' <<<"${NEEDS_JSON}" | sort)"
          missing="$(comm -23 <(printf '%s\n' "${declared}") <(printf '%s\n' "${wired}"))"
          if [[ -n "${missing}" ]]; then
            echo "Jobs declared in the workflow but missing from done.needs:"
            while read -r job; do
              echo "  - ${job}"
              echo "::error title=Gate is missing a job::${job} not in done.needs"
            done <<<"${missing}"
            exit 1
          fi
          echo "done covers all $(grep -c . <<<"${declared}") workflow jobs."
      - name: Verify required jobs succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          {
            echo "| Required job | Result |"
            echo "| --- | --- |"
            jq -r 'to_entries[] | "| \(.key) | \(.value.result) |"' <<<"${NEEDS_JSON}"
          } >>"${GITHUB_STEP_SUMMARY}"

          failed="$(jq -r 'to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | .key' <<<"${NEEDS_JSON}")"

          if [[ -n "${failed}" ]]; then
            echo "The following required jobs did not succeed:"
            while read -r job; do
              echo "  - ${job}"
              echo "::error title=Required job failed::${job} did not succeed"
            done <<<"${failed}"
            exit 1
          fi

          echo "All required jobs succeeded."
